<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | MedoChat</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>
    <main class="auth-shell">
        <section class="auth-panel">
            <a class="brand" href="index.html">
                <img src="../../images/logo.png" alt="MedoChat Logo">
                <span>MedoChat</span>
            </a>
            <h1>Reset password</h1>
            <p class="subtitle">Enter your email to prepare a secure reset link.</p>
            <div class="alerts" id="formAlerts" hidden></div>
            <form method="post" action="/auth/forgot-password" data-static-redirect="login.html?notice=Reset%20link%20prepared%20in%20server%20mode.">
                <input type="hidden" name="csrf_token" value="">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>
                <button type="submit">Prepare Reset Link</button>
            </form>
            <p class="switch"><a href="login.html">Back to login</a></p>
        </section>
    </main>
    <script src="../js/auth.js"></script>
</body>

</html>
