<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MedoChat</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>
    <main class="auth-shell">
        <section class="auth-panel">
            <a class="brand" href="index.html">
                <img src="../../images/logo.png" alt="MedoChat Logo">
                <span>MedoChat</span>
            </a>
            <h1>Choose a new password</h1>
            <p class="subtitle">Create a strong new password for your account.</p>
            <div class="alerts" id="formAlerts" hidden></div>
            <form method="post" action="" data-static-redirect="login.html?notice=Password%20reset%20preview%20complete.">
                <input type="hidden" name="csrf_token" value="">
                <label for="password">New password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
                <label for="confirm_password">Confirm new password</label>
                <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="8" required>
                <button type="submit">Reset Password</button>
            </form>
            <p class="switch"><a href="login.html">Back to login</a></p>
        </section>
    </main>
    <script src="../js/auth.js"></script>
</body>

</html>
